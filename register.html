<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - AL MADINA TECHNICAL INSTITUTE</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .registration-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            padding: 20px;
        }
        
        .registration-wrapper {
            width: 100%;
            max-width: 600px;
            position: relative;
        }
        
        .registration-card {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .registration-header {
            margin-bottom: 2rem;
        }
        
        .registration-icon {
            font-size: 3rem;
            color: #4299e1;
            margin-bottom: 1rem;
        }
        
        .registration-header h1 {
            color: #1a365d;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .registration-header p {
            color: #666;
            font-size: 1rem;
        }
        
        .registration-form {
            text-align: left;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #1a365d;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4299e1;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .password-field {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 1.2rem;
            user-select: none;
            transition: color 0.3s ease;
        }
        
        .password-toggle:hover {
            color: #4299e1;
        }
        
        .course-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .course-option {
            display: flex;
            align-items: center;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .course-option:hover {
            border-color: #4299e1;
            background: rgba(66, 153, 225, 0.05);
        }
        
        .course-option input[type="checkbox"] {
            margin-right: 0.5rem;
            width: auto;
        }
        
        .terms-section {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        
        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        
        .terms-checkbox input {
            margin-top: 0.2rem;
            width: auto;
        }
        
        .terms-checkbox label {
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .terms-checkbox a {
            color: #4299e1;
            text-decoration: none;
        }
        
        .terms-checkbox a:hover {
            text-decoration: underline;
        }
        
        .submit-btn {
            width: 100%;
            background: #4299e1;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-bottom: 1.5rem;
        }
        
        .submit-btn:hover {
            background: #3182ce;
        }
        
        .submit-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        
        .login-link {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }
        
        .login-link a {
            color: #4299e1;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.3s ease;
            z-index: 10;
        }
        
        .back-home:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }
        
        .error-message {
            background: #fee;
            color: #c53030;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }
        
        .progress-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            gap: 0.5rem;
        }
        
        .progress-step {
            width: 30px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            transition: background 0.3s ease;
        }
        
        .progress-step.active {
            background: #4299e1;
        }
        
        .progress-step.completed {
            background: #48bb78;
        }
        
        @media (max-width: 768px) {
            .registration-wrapper {
                max-width: 500px;
            }
            
            .registration-card {
                padding: 2rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .course-selection {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .registration-wrapper {
                max-width: 350px;
            }
            
            .registration-card {
                padding: 1.5rem;
            }
            
            .registration-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← Back to Home</a>
    
    <div class="registration-container">
        <div class="registration-wrapper">
            <div class="registration-card">
                <div class="registration-header">
                    <div class="registration-icon">🎓</div>
                    <h1>Student Registration</h1>
                    <p>Join AL MADINA TECHNICAL INSTITUTE and start your journey</p>
                </div>
                
                <div class="progress-indicator">
                    <div class="progress-step active"></div>
                    <div class="progress-step"></div>
                    <div class="progress-step"></div>
                </div>
                
                <div class="success-message" id="successMessage">
                    Registration submitted successfully! We will contact you soon.
                </div>
                
                <div class="error-message" id="errorMessage">
                    Please fill in all required fields correctly.
                </div>
                
                <form class="registration-form" id="registrationForm" onsubmit="handleRegistration(event)">
                    <!-- Personal Information -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name *</label>
                            <input type="text" id="firstName" name="firstName" required placeholder="Enter your first name">
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name *</label>
                            <input type="text" id="lastName" name="lastName" required placeholder="Enter your last name">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input type="email" id="email" name="email" required placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" name="phone" required placeholder="+92 XXX XXXXXXX">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="dateOfBirth">Date of Birth *</label>
                            <input type="date" id="dateOfBirth" name="dateOfBirth" required>
                        </div>
                        <div class="form-group">
                            <label for="gender">Gender *</label>
                            <select id="gender" name="gender" required>
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Academic Information -->
                    <div class="form-group">
                        <label for="education">Highest Education *</label>
                        <select id="education" name="education" required>
                            <option value="">Select Education Level</option>
                            <option value="matric">Matric</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="bachelors">Bachelor's Degree</option>
                            <option value="masters">Master's Degree</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    
                    <!-- Course Selection -->
                    <div class="form-group">
                        <label>Select Courses of Interest *</label>
                        <div class="course-selection">
                            <div class="course-option">
                                <input type="checkbox" id="hvac" name="courses" value="HVAC Course">
                                <label for="hvac">HVAC Course</label>
                            </div>
                            <div class="course-option">
                                <input type="checkbox" id="electrical" name="courses" value="Electrical Course">
                                <label for="electrical">Electrical Course</label>
                            </div>
                            <div class="course-option">
                                <input type="checkbox" id="bms" name="courses" value="BMS Course">
                                <label for="bms">BMS Course</label>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Address -->
                    <div class="form-group">
                        <label for="address">Address *</label>
                        <textarea id="address" name="address" required placeholder="Enter your complete address"></textarea>
                    </div>
                    
                    <!-- Password -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password *</label>
                            <div class="password-field">
                                <input type="password" id="password" name="password" required placeholder="Create a password" minlength="6">
                                <span class="password-toggle" onclick="togglePassword('password')">👁️</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password *</label>
                            <div class="password-field">
                                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password" minlength="6">
                                <span class="password-toggle" onclick="togglePassword('confirmPassword')">👁️</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Terms and Conditions -->
                    <div class="terms-section">
                        <div class="terms-checkbox">
                            <input type="checkbox" id="terms" name="terms" required>
                            <label for="terms">
                                I agree to the <a href="#">Terms and Conditions</a> and <a href="#">Privacy Policy</a>. 
                                I understand that my information will be used for registration purposes and communication from AL MADINA TECHNICAL INSTITUTE.
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="submit-btn">Complete Registration</button>
                </form>
                
                <div class="login-link">
                    Already have an account? <a href="login.html">Login here</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword(fieldId) {
            const passwordField = document.getElementById(fieldId);
            const toggleIcon = passwordField.nextElementSibling;
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                passwordField.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }
        
        function handleRegistration(event) {
            event.preventDefault();
            
            const form = document.getElementById('registrationForm');
            const formData = new FormData(form);
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const submitBtn = form.querySelector('.submit-btn');
            
            // Validate passwords match
            const password = formData.get('password');
            const confirmPassword = formData.get('confirmPassword');
            
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match. Please try again.';
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                return;
            }
            
            // Validate at least one course selected
            const courses = formData.getAll('courses');
            if (courses.length === 0) {
                errorMessage.textContent = 'Please select at least one course.';
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                return;
            }
            
            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            
            // Simulate form submission
            setTimeout(() => {
                // Hide error message
                errorMessage.style.display = 'none';
                
                // Show success message
                successMessage.style.display = 'block';
                
                // Reset form
                form.reset();
                
                // Re-enable submit button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Complete Registration';
                
                // Update progress indicator
                const progressSteps = document.querySelectorAll('.progress-step');
                progressSteps.forEach(step => step.classList.add('completed'));
                
                // Scroll to success message
                successMessage.scrollIntoView({ behavior: 'smooth' });
                
                // Redirect to login after 3 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
                
            }, 2000);
        }
        
        // Add interactive course selection styling
        document.addEventListener('DOMContentLoaded', function() {
            const courseOptions = document.querySelectorAll('.course-option');
            
            courseOptions.forEach(option => {
                option.addEventListener('click', function() {
                    const checkbox = this.querySelector('input[type="checkbox"]');
                    checkbox.checked = !checkbox.checked;
                    
                    if (checkbox.checked) {
                        this.style.borderColor = '#4299e1';
                        this.style.background = 'rgba(66, 153, 225, 0.1)';
                    } else {
                        this.style.borderColor = '#e2e8f0';
                        this.style.background = 'transparent';
                    }
                });
            });
        });
    </script>
</body>
</html>
