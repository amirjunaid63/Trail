<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AL MADINA TECHNICAL INSTITUTE</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            padding: 20px;
        }
        
        .login-wrapper {
            width: 100%;
            max-width: 450px;
            position: relative;
        }
        
        .login-slider {
            position: relative;
            width: 100%;
            height: 600px;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .login-panel {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            padding: 3rem;
            box-sizing: border-box;
            transition: transform 0.5s ease-in-out;
            display: flex;
            flex-direction: column;
        }
        
        .login-panel.student {
            transform: translateX(0%);
            left: 0;
        }
        
        .login-panel.teacher {
            transform: translateX(100%);
            left: 0;
        }
        
        .login-panel.teacher.active {
            transform: translateX(-100%);
        }
        
        .login-panel.student.active {
            transform: translateX(-100%);
        }
        
        .login-toggle {
            display: flex;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 4px;
            margin-bottom: 2rem;
            position: relative;
        }
        
        .toggle-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: white;
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
            z-index: 2;
            position: relative;
        }
        
        .toggle-btn.active {
            color: #1a365d;
        }
        
        .toggle-slider {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            background: white;
            border-radius: 20px;
            transition: transform 0.3s ease;
            z-index: 1;
        }
        
        .toggle-slider.teacher {
            transform: translateX(100%);
        }
        
        .login-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .teacher-icon {
            color: #ffd700;
        }
        
        .student-icon {
            color: #4299e1;
        }
        
        .login-logo h1 {
            color: #1a365d;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        
        .login-logo span {
            color: #666;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .login-form {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #1a365d;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #1a365d;
        }
        
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .forgot-link {
            color: #1a365d;
            text-decoration: none;
            font-weight: 500;
        }
        
        .forgot-link:hover {
            color: #2c5282;
            text-decoration: underline;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }
        
        .teacher-login {
            background: #ffd700;
            color: #1a365d;
        }
        
        .teacher-login:hover {
            background: #ffed4e;
        }
        
        .student-login {
            background: #4299e1;
            color: white;
        }
        
        .student-login:hover {
            background: #3182ce;
        }
        
        .signup-link {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-top: auto;
        }
        
        .signup-link a {
            color: #1a365d;
            text-decoration: none;
            font-weight: 600;
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
        
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.3s ease;
            z-index: 10;
        }
        
        .back-home:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .error-message {
            background: #fee;
            color: #c53030;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .login-wrapper {
                max-width: 400px;
            }
            
            .login-slider {
                height: 550px;
            }
            
            .login-panel {
                padding: 2rem;
            }
            
            .login-logo h1 {
                font-size: 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .login-wrapper {
                max-width: 350px;
            }
            
            .login-slider {
                height: 500px;
            }
            
            .login-panel {
                padding: 1.5rem;
            }
            
            .login-logo h1 {
                font-size: 1.3rem;
            }
            
            .toggle-btn {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← Back to Home</a>
    
    <div class="login-container">
        <div class="login-wrapper">
            <!-- Toggle Buttons -->
            <div class="login-toggle">
                <button class="toggle-btn active" onclick="switchToStudent()">Student</button>
                <button class="toggle-btn" onclick="switchToTeacher()">Teacher</button>
                <div class="toggle-slider" id="toggleSlider"></div>
            </div>
            
            <!-- Sliding Login Panels -->
            <div class="login-slider">
                <!-- Student Login Panel -->
                <div class="login-panel student" id="studentPanel">
                    <div class="login-icon student-icon">🎓</div>
                    <div class="login-logo">
                        <h1>Student Login</h1>
                        <span>Access your student portal</span>
                    </div>
                    
                    <form class="login-form" id="studentLoginForm" onsubmit="handleLogin(event, 'student')">
                        <div class="error-message" id="studentErrorMessage">
                            Invalid credentials. Please try again.
                        </div>
                        
                        <div class="form-group">
                            <label for="studentUsername">Student ID or Email</label>
                            <input type="text" id="studentUsername" name="username" required placeholder="Enter your student ID or email">
                        </div>
                        
                        <div class="form-group">
                            <label for="studentPassword">Password</label>
                            <input type="password" id="studentPassword" name="password" required placeholder="Enter your password">
                        </div>
                        
                        <div class="remember-forgot">
                            <div class="remember-me">
                                <input type="checkbox" id="studentRemember" name="remember">
                                <label for="studentRemember">Remember me</label>
                            </div>
                            <a href="#" class="forgot-link" onclick="handleForgotPassword(event, 'student')">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="login-btn student-login">Login as Student</button>
                    </form>
                    
                    <div class="signup-link">
                        New student? <a href="register.html">Register Now</a>
                    </div>
                </div>
                
                <!-- Teacher Login Panel -->
                <div class="login-panel teacher" id="teacherPanel">
                    <div class="login-icon teacher-icon">👨‍🏫</div>
                    <div class="login-logo">
                        <h1>Teacher Login</h1>
                        <span>Access your teaching dashboard</span>
                    </div>
                    
                    <form class="login-form" id="teacherLoginForm" onsubmit="handleLogin(event, 'teacher')">
                        <div class="error-message" id="teacherErrorMessage">
                            Invalid credentials. Please try again.
                        </div>
                        
                        <div class="form-group">
                            <label for="teacherUsername">Teacher ID or Email</label>
                            <input type="text" id="teacherUsername" name="username" required placeholder="Enter your teacher ID or email">
                        </div>
                        
                        <div class="form-group">
                            <label for="teacherPassword">Password</label>
                            <input type="password" id="teacherPassword" name="password" required placeholder="Enter your password">
                        </div>
                        
                        <div class="remember-forgot">
                            <div class="remember-me">
                                <input type="checkbox" id="teacherRemember" name="remember">
                                <label for="teacherRemember">Remember me</label>
                            </div>
                            <a href="#" class="forgot-link" onclick="handleForgotPassword(event, 'teacher')">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="login-btn teacher-login">Login as Teacher</button>
                    </form>
                    
                    <div class="signup-link">
                        New teacher? <a href="#">Contact Admin</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Toggle functions for sliding interface
        function switchToStudent() {
            const studentPanel = document.getElementById('studentPanel');
            const teacherPanel = document.getElementById('teacherPanel');
            const toggleSlider = document.getElementById('toggleSlider');
            const toggleBtns = document.querySelectorAll('.toggle-btn');
            
            // Update panels - show student, hide teacher
            studentPanel.style.transform = 'translateX(0%)';
            teacherPanel.style.transform = 'translateX(100%)';
            
            // Update toggle slider
            toggleSlider.classList.remove('teacher');
            
            // Update buttons
            toggleBtns[0].classList.add('active');
            toggleBtns[1].classList.remove('active');
        }
        
        function switchToTeacher() {
            const studentPanel = document.getElementById('studentPanel');
            const teacherPanel = document.getElementById('teacherPanel');
            const toggleSlider = document.getElementById('toggleSlider');
            const toggleBtns = document.querySelectorAll('.toggle-btn');
            
            // Update panels - show teacher, hide student
            teacherPanel.style.transform = 'translateX(0%)';
            studentPanel.style.transform = 'translateX(-100%)';
            
            // Update toggle slider
            toggleSlider.classList.add('teacher');
            
            // Update buttons
            toggleBtns[1].classList.add('active');
            toggleBtns[0].classList.remove('active');
        }
        
        function handleLogin(event, userType) {
            event.preventDefault();
            
            let username, password, errorMessage, rememberMe;
            
            if (userType === 'teacher') {
                username = document.getElementById('teacherUsername').value;
                password = document.getElementById('teacherPassword').value;
                errorMessage = document.getElementById('teacherErrorMessage');
                rememberMe = document.getElementById('teacherRemember').checked;
            } else {
                username = document.getElementById('studentUsername').value;
                password = document.getElementById('studentPassword').value;
                errorMessage = document.getElementById('studentErrorMessage');
                rememberMe = document.getElementById('studentRemember').checked;
            }
            
            // Simple validation (in real app, this would be server-side)
            if (username && password) {
                // Store login info if remember me is checked
                if (rememberMe) {
                    localStorage.setItem(`remembered${userType}User`, username);
                }
                
                // Redirect to appropriate dashboard
                const dashboard = userType === 'teacher' ? 'teacher dashboard' : 'student portal';
                alert(`Login successful! Redirecting to ${dashboard}...`);
                window.location.href = 'index.html';
            } else {
                errorMessage.style.display = 'block';
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 5000);
            }
        }
        
        function handleForgotPassword(event, userType) {
            event.preventDefault();
            const email = prompt(`Enter your ${userType} email address to reset password:`);
            if (email) {
                alert(`Password reset link has been sent to ${email}`);
            }
        }
        
        // Check for remembered users on page load
        window.addEventListener('load', function() {
            const rememberedTeacher = localStorage.getItem('rememberedTeacherUser');
            const rememberedStudent = localStorage.getItem('rememberedStudentUser');
            
            if (rememberedTeacher) {
                document.getElementById('teacherUsername').value = rememberedTeacher;
                document.getElementById('teacherRemember').checked = true;
            }
            
            if (rememberedStudent) {
                document.getElementById('studentUsername').value = rememberedStudent;
                document.getElementById('studentRemember').checked = true;
            }
        });
    </script>
</body>
</html>
